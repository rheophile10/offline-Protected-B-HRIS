<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Strict CSP (standards.md §4). connect-src 'none' is the primary
      anti-exfiltration control: no script in this file can send data over the
      network. wasm-unsafe-eval is required to instantiate the SQLite WASM.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none';
               script-src 'unsafe-inline' 'wasm-unsafe-eval';
               style-src 'unsafe-inline';
               img-src data: blob:;
               font-src data:;
               connect-src 'none';
               object-src 'none';
               base-uri 'none';
               form-action 'none';
               frame-src 'none';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline HRIS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
